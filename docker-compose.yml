services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    env_file:
      - .env.docker
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    env_file:
      - .env.docker
    entrypoint: ["/bin/sh", "/infra/minio-init.sh"]
    volumes:
      - ./infra:/infra:ro
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    env_file:
      - .env.docker
    depends_on:
      - redis
      - minio-init
    volumes:
      - sqlite-data:/app/data

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file:
      - .env.docker
    depends_on:
      - api
      - redis
      - minio-init
    volumes:
      - sqlite-data:/app/data

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    env_file:
      - .env.docker
    depends_on:
      - api
    ports:
      - "5090:5090"

volumes:
  redis-data:
  minio-data:
  sqlite-data:
