services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: markreel
      POSTGRES_USER: markreel
      POSTGRES_PASSWORD: markreel
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-markreel}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-markreel_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data

  minio-init:
    image: minio/mc:RELEASE.2025-01-17T23-26-00Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -e
      mc alias set local ${S3_ENDPOINT:-http://minio:9000} ${S3_ACCESS_KEY:-markreel} ${S3_SECRET_KEY:-markreel_secret}
      mc mb -p local/${S3_BUCKET_ORIGINAL:-markreel-original} || true
      mc mb -p local/${S3_BUCKET_DERIVED:-markreel-derived} || true
      mc mb -p local/${S3_BUCKET_ATTACHMENTS:-markreel-attachments} || true
      mc anonymous set download local/${S3_BUCKET_DERIVED:-markreel-derived} || true
      echo "MinIO buckets ready"
    restart: "no"

  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
      - minio-init
    ports:
      - "4000:4000"

  worker:
    build:
      context: .
      dockerfile: infra/Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
      - minio-init

  web:
    build:
      context: .
      dockerfile: infra/Dockerfile.web
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "5090:5090"
